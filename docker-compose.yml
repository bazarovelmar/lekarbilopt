services:
  app:
    build: .
    container_name: lbo-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:1.27-alpine
    container_name: lbo-nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  worker:
    build: .
    container_name: lbo-worker
    working_dir: /var/www/html
    command: php artisan queue:work --sleep=1 --tries=2 --timeout=180
    volumes:
      - ./:/var/www/html
    depends_on:
      - app
      - redis

  postgres:
    image: postgres:16-alpine
    container_name: lbo-postgres
    environment:
      POSTGRES_DB: lbo
      POSTGRES_USER: lbo
      POSTGRES_PASSWORD: lbo
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: lbo-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
